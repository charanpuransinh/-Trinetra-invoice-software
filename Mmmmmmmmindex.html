<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra - Staff Ledger</title>
    <style>
        /* Zero-Scroll & Theme Sync */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: #fff; }
        body { display: flex; flex-direction: column; }

        .container { flex: 1; display: flex; flex-direction: column; padding: 8px; }

        /* Header */
        .header {
            text-align: center;
            border: 1px solid #FFD700;
            padding: 8px;
            margin-bottom: 8px;
            background: #0a0a0a;
        }
        .header h1 { font-size: 18px; color: #FFD700; letter-spacing: 2px; font-weight: 900; }

        /* Add Staff Form Section */
        .card-form {
            border: 1px solid #FFD700;
            padding: 10px;
            margin-bottom: 10px;
            background: #111;
        }
        .form-row { display: flex; gap: 5px; margin-bottom: 5px; }
        input { 
            flex: 1; 
            padding: 10px; 
            background: #222; 
            border: 1px solid #444; 
            color: #fff; 
            font-size: 12px;
            outline: none;
        }
        input:focus { border-color: #FFD700; }
        .btn-add { 
            width: 100%; 
            padding: 12px; 
            background: #FFD700; 
            color: #000; 
            border: none; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        /* List Area */
        .list-box {
            border: 2px solid #FFD700;
            background: #050505;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar { background: #FFD700; color: #000; font-size: 10px; font-weight: 900; padding: 6px; text-align: center; }
        .scroll-area { overflow-y: auto; flex: 1; padding: 5px; }

        /* Labor Item Card */
        .labor-item {
            border: 1px solid #333;
            margin-bottom: 10px;
            background: #111;
        }
        .labor-top { 
            padding: 8px; 
            background: #222; 
            border-bottom: 1px solid #FFD700; 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            font-weight: 900; 
            color: #FFD700;
        }
        .stats-grid { display: flex; flex-wrap: wrap; padding: 5px; }
        .stat-box { 
            flex: 1 1 33%; 
            padding: 5px; 
            text-align: center; 
            border: 1px solid #222; 
            font-size: 10px;
        }
        .label { color: #888; display: block; font-size: 8px; text-transform: uppercase; }
        .val-green { color: #00FF00; font-weight: bold; }
        .val-red { color: #FF4444; font-weight: bold; }

        /* Buttons in List */
        .action-btns { display: flex; padding: 5px; gap: 5px; }
        .btn-s { flex: 1; padding: 8px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; }
        .btn-att { background: #004400; color: #00FF00; border: 1px solid #00FF00; }
        .btn-pay { background: #444; color: #FFD700; border: 1px solid #FFD700; }

        /* Nav Bar - Same as Your Homepage */
        .nav-bar {
            height: 75px;
            display: flex;
            border-top: 2px solid #FFD700;
            background: #000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .active { color: #FFD700; }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>TRISHUL TRINETRA</h1></div>

    <div class="card-form">
        <div class="form-row">
            <input type="text" id="labName" placeholder="Name">
            <input type="text" id="labPost" placeholder="Post">
        </div>
        <div class="form-row">
            <input type="number" id="labWage" placeholder="Daily Wage">
            <input type="number" id="labAdvance" placeholder="Advance">
        </div>
        <button class="btn-add" id="addLaborBtn">Add New Staff</button>
    </div>

    <div class="list-box">
        <div class="title-bar">STAFF ATTENDANCE & PAYROLL</div>
        <div class="scroll-area" id="laborList">
            </div>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><span>🏠</span>HOME</a>
    <a href="parties.html" class="nav-item"><span>👥</span>PARTY</a>
    <a href="management.html" class="nav-item active"><span>📊</span>MGMT</a>
    <a href="items.html" class="nav-item"><span>📦</span>ITEM</a>
    <a href="profile.html" class="nav-item"><span>👤</span>USER</a>
</nav>

<script>
    let laborers = [];

    function saveToLocal() { localStorage.setItem('laborData', JSON.stringify(laborers)); }
    function loadFromLocal() {
        let data = localStorage.getItem('laborData');
        laborers = data ? JSON.parse(data) : [];
        renderList();
    }

    function renderList() {
        let container = document.getElementById('laborList');
        if(laborers.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#444;">No Staff Added</div>';
            return;
        }
        let html = '';
        laborers.forEach((lab, idx) => {
            let totalSalary = lab.attendance * lab.wage;
            let due = totalSalary - lab.paid;
            html += `
                <div class="labor-item">
                    <div class="labor-top"><span>${lab.name}</span><span>[${lab.post}]</span></div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="label">Wage</span>₹${lab.wage}</div>
                        <div class="stat-box"><span class="label">Attnd.</span>${lab.attendance} D</div>
                        <div class="stat-box"><span class="label">Earned</span>₹${totalSalary}</div>
                        <div class="stat-box"><span class="label">Paid</span>₹${lab.paid}</div>
                        <div class="stat-box"><span class="label">Due</span><span class="val-red">₹${due}</span></div>
                        <div class="stat-box"><span class="label">Adv.</span>₹${lab.advance}</div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-s btn-att" onclick="markAttendance(${idx})">PRESENT (+1)</button>
                        <button class="btn-s btn-pay" onclick="makePayment(${idx})">PAYMENT</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        saveToLocal();
    }

    function markAttendance(i) { laborers[i].attendance += 1; renderList(); }
    
    function makePayment(i) {
        let due = (laborers[i].attendance * laborers[i].wage) - laborers[i].paid;
        let amt = prompt(`Due: ₹${due}. Enter Amount:`, due);
        if(amt && !isNaN(amt) && amt > 0) {
            laborers[i].paid += parseFloat(amt);
            renderList();
        }
    }

    document.getElementById('addLaborBtn').addEventListener('click', () => {
        let name = document.getElementById('labName').value;
        let post = document.getElementById('labPost').value;
        let wage = parseFloat(document.getElementById('labWage').value);
        let adv = parseFloat(document.getElementById('labAdvance').value) || 0;

        if(name && post && wage) {
            laborers.push({ name, post, wage, advance: adv, attendance: 0, paid: 0 });
            document.getElementById('labName').value = '';
            document.getElementById('labPost').value = '';
            document.getElementById('labWage').value = '';
            document.getElementById('labAdvance').value = '';
            renderList();
        }
    });

    loadFromLocal();
</script>
</body>
</html>
