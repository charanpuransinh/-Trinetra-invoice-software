<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra Software - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tiranga-header"></div>

    <div class="container">
        <header style="text-align: center; margin: 20px 0;">
            <h1 style="color: #FFD700; font-size: 1.8rem; letter-spacing: 2px;">TRINETRA SOFTWARE</h1>
        </header>

        <div class="dashboard-grid">
            
            <div class="main-card">
                <div class="card-header">PARTY</div>
                <div class="card-content">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Ledger & History</p>
                    <button onclick="location.href='parties.html'">OPEN</button>
                </div>
            </div>

            <div class="main-card">
                <div class="card-header">ITEM</div>
                <div class="card-content">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Stock & Rates</p>
                    <button onclick="location.href='items.html'">OPEN</button>
                </div>
            </div>

            <div class="main-card">
                <div class="card-header">BILLING</div>
                <div class="card-content">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Invoice & Quote</p>
                    <button onclick="location.href='billing.html'">CREATE</button>
                </div>
            </div>

            <div class="main-card">
                <div class="card-header">ACCOUNTS</div>
                <div class="card-content">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">GST & Expenses</p>
                    <button onclick="location.href='accounts.html'">VIEW</button>
                </div>
            </div>

        </div>
    </div>

    <nav class="bottom-nav">
        <a href="parties.html" class="nav-item">
            <span class="nav-icon">👥</span><span class="nav-text">Party</span>
        </a>
        <a href="billing.html" class="nav-item">
            <span class="nav-icon">📄</span><span class="nav-text">Bill</span>
        </a>
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span><span class="nav-text">Home</span>
        </a>
        <a href="items.html" class="nav-item">
            <span class="nav-icon">📦</span><span class="nav-text">Stock</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span><span class="nav-text">Profile</span>
        </a>
    </nav>
</body>
</html>
