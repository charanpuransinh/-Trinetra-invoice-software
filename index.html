<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra Billing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
    <div class="tiranga-header"></div>

    <div class="container">
        <header class="main-header">
            <div class="logo">🔱</div>
            <h1 class="software-name">TRINETRA BILLING SOFTWARE</h1>
        </header>

        <div class="dashboard-grid">
            <div class="info-box">
                <span class="box-label">TOTAL SALES</span>
                <div class="box-value">₹0.00</div>
            </div>
            <div class="info-box">
                <span class="box-label">BILLS</span>
                <div class="box-value">0</div>
            </div>
            <div class="info-box">
                <span class="box-label">QUOTES</span>
                <div class="box-value">0</div>
            </div>
            <div class="info-box">
                <span class="box-label">DUE AMT</span>
                <div class="box-value" style="color: #ff4444;">₹0.00</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">HOME</span>
        </a>
        <a href="parties.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-text">PARTY</span>
        </a>
        <a href="billing.html" class="nav-item main-btn">
            <span class="nav-icon">⚡</span>
        </a>
        <a href="items.html" class="nav-item">
            <span class="nav-icon">📦</span>
            <span class="nav-text">ITEM</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-text">PROFILE</span>
        </a>
    </nav>
</body>
</html>
