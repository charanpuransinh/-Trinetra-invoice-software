<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra - Management</title>
    <style>
        /* Zero-Scroll & Theme Sync */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: #fff; }
        body { display: flex; flex-direction: column; }

        .container { flex: 1; display: flex; flex-direction: column; padding: 8px; }

        /* 1. Top Logo & Ledger Title */
        .header {
            text-align: center;
            border: 1px solid #FFD700;
            padding: 8px;
            margin-bottom: 8px;
            background: #0a0a0a;
        }
        .header h1 { font-size: 18px; color: #FFD700; letter-spacing: 2px; font-weight: 900; }
        .ledger-label {
            font-size: 12px;
            color: #FFD700;
            margin-top: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 2. Staff Management Box */
        .staff-box {
            border: 2px solid #FFD700;
            background: #111;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar {
            background: #FFD700;
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Staff List Area */
        .scroll-area { overflow-y: auto; flex: 1; padding: 5px; }
        
        .staff-card {
            border: 1px solid #333;
            margin-bottom: 12px;
            background: #050505;
        }

        /* Name & Post Row */
        .staff-header {
            background: #222;
            padding: 10px;
            border-bottom: 1px solid #FFD700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .staff-name { font-size: 16px; font-weight: 900; color: #FFD700; text-transform: uppercase; }
        .staff-post { font-size: 10px; color: #fff; background: #444; padding: 2px 6px; border-radius: 2px; }

        /* Salary & Attendance Data */
        .salary-grid { display: flex; border-bottom: 1px solid #222; }
        .data-col { flex: 1; padding: 10px; border-right: 1px solid #222; text-align: center; }
        .data-col:last-child { border-right: none; }
        
        .label { font-size: 8px; color: #FFD700; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .value { font-size: 13px; font-weight: bold; }
        .total-value { font-size: 14px; font-weight: 900; color: #00FF00; } /* Net Salary in Green */

        /* 3. Action Buttons */
        .footer-action { margin-top: 8px; }
        .btn-add {
            background: #FFD700;
            color: #000;
            width: 100%;
            padding: 15px;
            border: none;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* 4. Navigation Bar - Same as Home */
        .nav-bar {
            height: 75px;
            display: flex;
            border-top: 2px solid #FFD700;
            background: #000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .active { color: #FFD700; }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRISHUL TRINETRA</h1>
        <div class="ledger-label">STAFF LEDGER MANAGEMENT</div>
    </div>

    <div class="staff-box">
        <div class="title-bar">EMPLOYEE ATTENDANCE & SALARY</div>
        
        <div class="scroll-area">
            <div class="staff-card">
                <div class="staff-header">
                    <div class="staff-name">RAJESH KUMAR</div>
                    <div class="staff-post">SUPERVISOR</div>
                </div>

                <div class="salary-grid">
                    <div class="data-col">
                        <span class="label">Daily Rate</span>
                        <span class="value">₹ 800</span>
                    </div>
                    <div class="data-col">
                        <span class="label">Total Days</span>
                        <span class="value">26 Days</span>
                    </div>
                    <div class="data-col">
                        <span class="label">Net Salary</span>
                        <span class="total-value">₹ 20,800</span>
                    </div>
                </div>
            </div>

            <div class="staff-card">
                <div class="staff-header">
                    <div class="staff-name">SURESH BHAI</div>
                    <div class="staff-post">SALES AGENT</div>
                </div>

                <div class="salary-grid">
                    <div class="data-col">
                        <span class="label">Daily Rate</span>
                        <span class="value">₹ 600</span>
                    </div>
                    <div class="data-col">
                        <span class="label">Total Days</span>
                        <span class="value">24 Days</span>
                    </div>
                    <div class="data-col">
                        <span class="label">Net Salary</span>
                        <span class="total-value">₹ 14,400</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-add">ADD NEW STAFF ENTRY</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><span>🏠</span>HOME</a>
    <a href="parties.html" class="nav-item"><span>👥</span>PARTY</a>
    <a href="management.html" class="nav-item active"><span>📊</span>MGMT</a>
    <a href="items.html" class="nav-item"><span>📦</span>ITEM</a>
    <a href="profile.html" class="nav-item"><span>👤</span>USER</a>
</nav>

</body>
  </html>
