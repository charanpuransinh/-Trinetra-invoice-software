<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra Pro - Zero Scroll</title>
    <style>
        /* 1. Global Reset & Force No-Scroll */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000000;
        }

        body {
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        /* 2. Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            justify-content: space-between;
        }

        /* 3. Header Section */
        .header {
            text-align: center;
            border: 1px solid #FFD700;
            padding: 6px;
            margin-bottom: 8px;
        }
        .header h1 { font-size: 18px; color: #FFD700; letter-spacing: 2px; }

        /* 4. Profile Box (Chorus/Sharp Corners) */
        .profile-box {
            background-color: #111111;
            border: 2px solid #FFD700;
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .comp-name { font-size: 16px; font-weight: 700; color: #FFD700; margin-bottom: 4px; text-transform: uppercase; }
        .comp-detail { font-size: 11px; margin-top: 2px; opacity: 0.8; }
        .comp-divider { height: 1px; background-color: #FFD700; margin: 6px 0; opacity: 0.3; }

        /* 5. 4 Boxes Grid (Chorus & Compact) */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            flex: 1; /* Automatically fits the middle screen area */
        }
        .big-card {
            background-color: #111111;
            border: 2px solid #FFD700;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .card-label {
            font-size: 11px;
            background-color: #FFD700;
            color: #000000;
            width: 100%;
            padding: 3px 0;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .card-val { font-size: 14px; font-weight: bold; color: #ffffff; }

        /* 6. Action Button Section */
        .action-area { margin: 10px 0; }
        .btn-gen {
            background-color: #FFD700;
            color: #000000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 7. Bottom Navigation (Fixed at bottom) */
        .nav-bar {
            height: 70px;
            background-color: #080808;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid #FFD700;
        }
        .nav-link {
            text-align: center;
            flex: 1;
            font-size: 10px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .nav-link.active { color: #FFD700; }
        .nav-link span { display: block; font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRISHUL TRINETRA</h1>
    </div>

    <div class="profile-box">
        <div class="comp-name">CHARAN PURANSINGH</div>
        <div class="comp-detail">PHONE: +91 98765 43210</div>
        <div class="comp-detail">LOC: RAJKOT, GUJARAT</div>
        <div class="comp-divider"></div>
        <div class="comp-detail">GSTIN: 24ABCDE1234F1Z</div>
    </div>

    <div class="grid-4">
        <div class="big-card"><span class="card-label">PARTY</span><div class="card-val">RAM ENTERPRISE</div></div>
        <div class="big-card"><span class="card-label">ITEMS</span><div class="card-val">STEEL / CEMENT</div></div>
        <div class="big-card"><span class="card-label">ACCOUNT</span><div class="card-val">INR 24,500</div></div>
        <div class="big-card"><span class="card-label">DASHBOARD</span><div class="card-val">MANAGEMENT</div></div>
    </div>

    <div class="action-area">
        <button class="btn-gen">GENERATE BILL</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-link active"><span>HOME</span></a>
    <a href="parties.html" class="nav-link"><span>PARTY</span></a>
    <a href="billing.html" class="nav-link"><span>BILL</span></a>
    <a href="items.html" class="nav-link"><span>ITEM</span></a>
    <a href="profile.html" class="nav-link"><span>USER</span></a>
</nav>

</body>
</html>
