<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra - Items</title>
    <style>
        /* Zero-Scroll & Theme Sync */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: #fff; }
        body { display: flex; flex-direction: column; }

        .container { flex: 1; display: flex; flex-direction: column; padding: 10px; }

        /* Branding - Same as Homepage */
        .header {
            text-align: center;
            border: 1px solid #FFD700;
            padding: 8px;
            margin-bottom: 10px;
            background: #0a0a0a;
        }
        .header h1 { font-size: 18px; color: #FFD700; letter-spacing: 2px; font-weight: 900; }

        /* Inventory Table Section */
        .inventory-box {
            border: 2px solid #FFD700;
            background: #111;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar {
            background: #FFD700;
            color: #000;
            font-size: 11px;
            font-weight: 900;
            padding: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Table Logic with HSN Code */
        .scroll-area { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        th {
            position: sticky; top: 0;
            background: #222;
            color: #FFD700;
            font-size: 10px;
            padding: 12px 4px;
            text-align: left;
            border-bottom: 2px solid #FFD700;
            z-index: 10;
        }
        td {
            padding: 12px 4px;
            font-size: 11px;
            border-bottom: 1px solid #333;
            font-weight: bold;
        }

        /* Status Colors */
        .text-yellow { color: #FFD700; }
        .text-green { color: #00FF00; }
        
        .btn-edit {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 5px 8px;
            font-size: 9px;
            font-weight: 900;
            cursor: pointer;
        }

        .footer-action { margin-top: 10px; }
        .btn-add {
            background: #FFD700;
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Navigation Bar - Fixed Icon Sizes (Homepage Style) */
        .nav-bar {
            height: 75px; /* Size matched to homepage */
            display: flex;
            border-top: 2px solid #FFD700;
            background: #000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .active { color: #FFD700; }
        .nav-item span { 
            display: block; 
            font-size: 24px; /* Icon size matched to homepage */
            margin-bottom: 4px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>TRISHUL TRINETRA</h1></div>

    <div class="inventory-box">
        <div class="title-bar">ITEM STOCK & HSN MANAGER</div>
        
        <div class="scroll-area">
            <table>
                <thead>
                    <tr>
                        <th>HSN</th>
                        <th>ITEM</th>
                        <th>IN</th>
                        <th>STOCK</th>
                        <th>ACT</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-yellow">7214</td>
                        <td>STEEL 12MM</td>
                        <td class="text-green">+100</td>
                        <td>80</td>
                        <td><button class="btn-edit">EDIT</button></td>
                    </tr>
                    <tr>
                        <td class="text-yellow">2523</td>
                        <td>CEMENT BAG</td>
                        <td class="text-green">+500</td>
                        <td>350</td>
                        <td><button class="btn-edit">EDIT</button></td>
                    </tr>
                    <tr>
                        <td class="text-yellow">6904</td>
                        <td>BRICKS A</td>
                        <td class="text-green">+2k</td>
                        <td>1.5k</td>
                        <td><button class="btn-edit">EDIT</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-add">ADD NEW ITEM</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><span>🏠</span>HOME</a>
    <a href="parties.html" class="nav-item"><span>👥</span>PARTY</a>
    <a href="billing.html" class="nav-item"><span>🧾</span>BILL</a>
    <a href="items.html" class="nav-item active"><span>📦</span>ITEM</a>
    <a href="profile.html" class="nav-item"><span>👤</span>USER</a>
</nav>

</body>
</html>
