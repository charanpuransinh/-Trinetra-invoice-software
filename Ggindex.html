<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra Software</title>
    <style>
        /* 1. पूरा काला बैकग्राउंड और रिसेट */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 90px; overflow-x: hidden; }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        /* 2. हेडर: TRISHUL Logo और नाम */
        .header { text-align: center; padding: 30px 10px; }
        .logo-icon { font-size: 3.5rem; color: #FFD700; margin-bottom: 5px; }
        .software-name { color: #FFD700; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; }

        /* 3. बड़े और चौकोर (Chorus) 4 बॉक्स जो आपस में टच हैं */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* गैप को 1px किया ताकि वे आपस में जुड़े लगें और बॉर्डर दिखे */
            gap: 1px; 
            background: #FFD700; /* ये गैप में सुनहरी लाइन का काम करेगा */
            border: 1px solid #FFD700; /* बाहरी बॉर्डर */
            margin-top: 10px;
        }

        .big-card {
            background: #111; /* बॉक्स के अंदर का रंग काला */
            padding: 40px 10px; /* बॉक्स को बड़ा करने के लिए ज्यादा पैडिंग */
            text-align: center;
            border-radius: 0; /* एकदम चौकोर (No round corners) */
        }

        .big-card .title {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }

        .big-card .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD700; /* सुनहरी वैल्यू */
        }

        /* 4. बीच का बड़ा बिल बटन */
        .btn-section { text-align: center; margin: 30px 0; }
        .bill-generate {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 5px;
            width: 85%;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 5. नीचे के 5 प्रोफेशनल आइकन (जैसे त्रिशूल ऐप में थे) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #080808;
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 0;
            border-top: 2px solid #FFD700;
            max-width: 500px; margin: 0 auto;
        }

        .nav-item {
            text-align: center; flex: 1; color: #666;
            text-decoration: none; font-size: 10px; font-weight: bold;
        }

        .nav-item.active { color: #FFD700; }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-icon">🔱</div>
        <div class="software-name">TRINETRA BILLING SOFTWARE</div>
    </div>

    <div class="grid-4">
        <div class="big-card">
            <span class="title">पार्टी (PARTY)</span>
            <div class="value">राम एंटरप्राइजेस</div>
        </div>
        <div class="big-card">
            <span class="title">आइटम (ITEM)</span>
            <div class="value">स्टील / सीमेंट</div>
        </div>
        <div class="big-card">
            <span class="title">अकाउंट (ACCOUNT)</span>
            <div class="value">₹ 24,500</div>
        </div>
        <div class="big-card">
            <span class="title">डैशबोर्ड (ALL)</span>
            <div class="value">डैशबोर्ड</div>
        </div>
    </div>

    <div class="btn-section">
        <button class="bill-generate">📄 बिल जनरेशन</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span>🏠</span>होम</a>
        <a href="#" class="nav-item"><span>👥</span>पार्टी</a>
        <a href="#" class="nav-item"><span>🧾</span>बिल</a>
        <a href="#" class="nav-item"><span>📦</span>आइटम</a>
        <a href="#" class="nav-item"><span>👤</span>प्रोफाइल</a>
    </nav>
</div>
</body>
</html>
