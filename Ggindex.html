<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra Pro Dashboard</title>
    <style>
        /* 1. बेसिक रिसेट */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 90px; overflow-x: hidden; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; }

        /* 2. ऊपर की तिरंगा पट्टी */
        .top-strip {
            height: 5px;
            background: linear-gradient(to right, #FF9933 33%, #fff 33%, #fff 66%, #138808 66%);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        /* 3. त्रिशूल लोगो सेक्शन */
        .header { text-align: center; padding-top: 40px; padding-bottom: 10px; }
        .logo-icon { font-size: 3.5rem; color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* 4. आपका नया स्पेशल बॉक्स (1200x100px) */
        .company-banner {
            width: 100%;
            max-width: 1200px;
            height: 100px;
            background: transparent;
            border-top: 2px solid #FFD700;
            border-bottom: 2px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto 20px;
        }

        .company-name {
            color: #FFD700;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
        }

        /* 5. वो 4 बड़े चौकोर बॉक्स (Chorus/Square) */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px; /* हल्की सी लाइन दिखाने के लिए */
            background: #FFD700; /* बॉर्डर का काम करेगा */
            border: 2px solid #FFD700;
        }

        .big-card {
            background: #111;
            padding: 40px 10px;
            text-align: center;
            border-radius: 0; /* एकदम चौकोर */
        }

        .card-label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 10px; font-weight: bold; }
        .card-value { font-size: 1.4rem; font-weight: bold; color: #FFD700; }

        /* 6. बिल जनरेशन बटन */
        .btn-section { text-align: center; margin: 30px 0; }
        .main-action-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 18px 0;
            font-size: 1.2rem;
            font-weight: 900;
            width: 90%;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        /* 7. नीचे के 5 गोल्डन आइकन */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #080808; border-top: 1px solid #FFD700;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 2000;
        }

        .nav-item { text-decoration: none; color: #555; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: #FFD700; }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 2px; }
        .nav-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="top-strip"></div>

    <div class="container">
        <header class="header">
            <div class="logo-icon">🔱</div>
        </header>

        <div class="company-banner">
            <div class="company-name">TRINETRA SOFTWARE</div>
        </div>

        <div class="grid-4">
            <div class="big-card">
                <span class="card-label">PARTIES</span>
                <div class="card-value">RAM ENTERPRISE</div>
            </div>
            <div class="big-card">
                <span class="card-label">STOCK</span>
                <div class="card-value">STEEL / CEMENT</div>
            </div>
            <div class="big-card">
                <span class="card-label">ACCOUNTS</span>
                <div class="card-value">₹ 24,500</div>
            </div>
            <div class="big-card">
                <span class="card-label">DASHBOARD</span>
                <div class="card-value">ALL IN ONE</div>
            </div>
        </div>

        <div class="btn-section">
            <button class="main-action-btn">📄 GENERATE INVOICE</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i>🏠</i><span>HOME</span></a>
        <a href="#" class="nav-item"><i>👥</i><span>PARTY</span></a>
        <a href="#" class="nav-item"><i>🧾</i><span>BILL</span></a>
        <a href="#" class="nav-item"><i>📦</i><span>ITEM</span></a>
        <a href="#" class="nav-item"><i>👤</i><span>PROFILE</span></a>
    </nav>

</body>
</html>
