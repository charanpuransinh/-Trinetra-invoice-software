<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra - Staff Ledger</title>
    <style>
        /* Zero-Scroll & Theme Sync */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: #fff; }
        body { display: flex; flex-direction: column; }

        .container { flex: 1; display: flex; flex-direction: column; padding: 8px; }

        /* Header Logo Section */
        .header {
            text-align: center;
            border: 1px solid #FFD700;
            padding: 8px;
            margin-bottom: 8px;
            background: #0a0a0a;
        }
        .header h1 { font-size: 18px; color: #FFD700; letter-spacing: 2px; font-weight: 900; }

        /* Management Table Box (Item Style) */
        .mgmt-box {
            border: 2px solid #FFD700;
            background: #111;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar {
            background: #FFD700;
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Table Logic - Same as Item Table */
        .scroll-area { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th {
            position: sticky; top: 0;
            background: #222;
            color: #FFD700;
            font-size: 9px;
            padding: 10px 2px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            z-index: 10;
        }
        td {
            padding: 12px 2px;
            font-size: 10px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            text-align: center;
            word-wrap: break-word;
        }

        /* Column Widths to fit everything in one line */
        .col-name { width: 25%; text-align: left; padding-left: 4px; color: #FFD700; }
        .col-sal { width: 15%; }
        .col-pres { width: 12%; color: #00FF00; }
        .col-abs { width: 12%; color: #FF4444; }
        .col-adv { width: 15%; }
        .col-total { width: 21%; background: #1a1a1a; color: #00FF00; }

        /* Footer Button */
        .footer-action { margin-top: 8px; }
        .btn-add {
            background: #FFD700;
            color: #000;
            width: 100%;
            padding: 15px;
            border: none;
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
        }

        /* Nav Bar - Homepage Style Icons */
        .nav-bar {
            height: 75px;
            display: flex;
            border-top: 2px solid #FFD700;
            background: #000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .active { color: #FFD700; }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>TRISHUL TRINETRA</h1></div>

    <div class="mgmt-box">
        <div class="title-bar">STAFF ATTENDANCE & PAYROLL</div>
        
        <div class="scroll-area">
            <table>
                <thead>
                    <tr>
                        <th class="col-name">NAME/POST</th>
                        <th class="col-sal">RATE</th>
                        <th class="col-pres">PRE.</th>
                        <th class="col-abs">ABS.</th>
                        <th class="col-adv">ADV.</th>
                        <th class="col-total">TOTAL PAY</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="col-name">RAJESH<br><small style="font-size:7px; color:#fff;">SUPRVSR</small></td>
                        <td class="col-sal">700</td>
                        <td class="col-pres">24</td>
                        <td class="col-abs">02</td>
                        <td class="col-adv">1000</td>
                        <td class="col-total">15,800</td>
                    </tr>
                    <tr>
                        <td class="col-name">SURESH<br><small style="font-size:7px; color:#fff;">HELPER</small></td>
                        <td class="col-sal">400</td>
                        <td class="col-pres">26</td>
                        <td class="col-abs">00</td>
                        <td class="col-adv">500</td>
                        <td class="col-total">9,900</td>
                    </tr>
                    <tr>
                        <td class="col-name">VIKRAM<br><small style="font-size:7px; color:#fff;">GUARD</small></td>
                        <td class="col-sal">500</td>
                        <td class="col-pres">22</td>
                        <td class="col-abs">04</td>
                        <td class="col-adv">0</td>
                        <td class="col-total">11,000</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-add">ADD ATTENDANCE / NEW STAFF</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><span>🏠</span>HOME</a>
    <a href="parties.html" class="nav-item"><span>👥</span>PARTY</a>
    <a href="management.html" class="nav-item active"><span>📊</span>MGMT</a>
    <a href="items.html" class="nav-item"><span>📦</span>ITEM</a>
    <a href="profile.html" class="nav-item"><span>👤</span>USER</a>
</nav>

</body>
</html>
