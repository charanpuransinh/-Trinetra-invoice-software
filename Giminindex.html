<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trinetra Software - बिलिंग ऐप</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 16px 12px 80px 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #f5f5f5;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            background: #1e2a3e;
            padding: 12px 0;
            border-radius: 24px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffc107;
        }
        .logo p {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            margin-top: 4px;
        }

        /* 4 बॉक्स */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }
        .big-card {
            background: white;
            border-radius: 20px;
            padding: 20px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .big-card .title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .big-card .value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        /* नीचे 5 आइकन */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 12px 20px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            border-top: 1px solid #e2e8f0;
            max-width: 500px;
            margin: 0 auto;
        }
        .nav-item {
            text-align: center;
            flex: 1;
            font-size: 12px;
            font-weight: 500;
            color: #5b6e8c;
        }
        .nav-item span {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }

        /* बिल जनरेशन बटन */
        .btn-bill {
            display: flex;
            justify-content: center;
            margin: 20px 0 20px;
        }
        .bill-generate {
            background: #1e2a3e;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 60px;
            width: 80%;
            max-width: 260px;
            text-align: center;
            cursor: pointer;
        }
        .bill-generate:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>TRISHUL</h1>
            <p>TRINETRA SOFTWARE</p>
        </div>
    </div>

    <!-- 4 बॉक्स: पार्टी, आइटम, अकाउंट, ALL IN ONE -->
    <div class="grid-4">
        <div class="big-card">
            <div class="title">पार्टी</div>
            <div class="value">राम एंटरप्राइजेस</div>
        </div>
        <div class="big-card">
            <div class="title">आइटम</div>
            <div class="value">स्टील / सीमेंट</div>
        </div>
        <div class="big-card">
            <div class="title">अकाउंट</div>
            <div class="value">₹ 24,500</div>
        </div>
        <div class="big-card">
            <div class="title">ALL IN ONE</div>
            <div class="value">डैशबोर्ड</div>
        </div>
    </div>

    <!-- बिल जनरेशन बटन (थोड़ा बड़ा) -->
    <div class="btn-bill">
        <button class="bill-generate">📄 बिल जनरेशन</button>
    </div>

    <!-- नीचे 5 आइकन -->
    <div class="bottom-nav">
        <div class="nav-item"><span>🏠</span>होम</div>
        <div class="nav-item"><span>👥</span>पार्टी</div>
        <div class="nav-item"><span>🧾</span>बिल</div>
        <div class="nav-item"><span>📦</span>आइटम</div>
        <div class="nav-item"><span>👤</span>प्रोफाइल</div>
    </div>
</div>
</body>
</html>
