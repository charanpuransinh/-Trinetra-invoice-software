<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trinetra Software - बिलिंग ऐप</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000; /* डार्क बैकग्राउंड */
            color: #fff;
            padding: 16px 12px 100px 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header - No Round Corners */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            background: #111;
            padding: 12px 0;
            border: 2px solid #ffc107; /* सुनहरी बॉर्डर */
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #ffc107;
            letter-spacing: 2px;
        }
        .logo p {
            font-size: 12px;
            color: #fff;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* PROFILE बॉक्स - Sharp Corners & Yellow Border */
        .profile-box {
            background: #111;
            border: 2px solid #ffc107; /* सुनहरी बॉर्डर */
            padding: 16px 20px;
            margin-bottom: 24px;
            color: white;
        }
        .profile-box .company-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffc107;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .profile-box .detail {
            font-size: 13px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
        }
        .divider {
            height: 1px;
            background: #ffc107;
            margin: 12px 0 10px 0;
            opacity: 0.5;
        }

        /* 4 बॉक्स - Sharp Right Angle */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .big-card {
            background: #111;
            padding: 20px 8px;
            text-align: center;
            border: 2px solid #ffc107; /* सुनहरी बॉर्डर */
        }
        .big-card .title {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            background: #ffc107; /* सुनहरी टाइटल पट्टी */
            display: block;
            padding: 4px 0;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .big-card .value {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        /* बिल जनरेशन बटन */
        .btn-bill {
            display: flex;
            justify-content: center;
            margin: 20px 0 20px;
        }
        .bill-generate {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* नीचे 5 आइकन */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #080808;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 15px;
            border-top: 2px solid #ffc107;
            max-width: 500px;
            margin: 0 auto;
        }
        .nav-item {
            text-align: center;
            flex: 1;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }
        .nav-item.active {
            color: #ffc107;
        }
        .nav-item span {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>🔱 TRISHUL 🔱</h1>
            <p>TRINETRA SOFTWARE</p>
        </div>
    </div>

    <div class="profile-box">
        <div class="company-name">
            <span>🏢</span> चारण पुराणसिंह
        </div>
        <div class="detail">
            <span>📞</span> +91 98765 43210
        </div>
        <div class="detail">
            <span>📍</span> राजकोट, गुजरात - 360001
        </div>
        <div class="detail">
            <span>📧</span> charan@trinetra.com
        </div>
        <div class="divider"></div>
        <div class="detail">
            <span>🆔</span> GST: 24ABCDE1234F1Z
        </div>
    </div>

    <div class="grid-4">
        <div class="big-card">
            <span class="title">पार्टी</span>
            <div class="value">राम एंटरप्राइजेस</div>
        </div>
        <div class="big-card">
            <span class="title">आइटम</span>
            <div class="value">स्टील / सीमेंट</div>
        </div>
        <div class="big-card">
            <span class="title">अकाउंट</span>
            <div class="value">₹ 24,500</div>
        </div>
        <div class="big-card">
            <span class="title">डैशबोर्ड</span>
            <div class="value">मैनेजमेंट</div>
        </div>
    </div>

    <div class="btn-bill">
        <button class="bill-generate">📄 बिल जनरेशन</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span>🏠</span>होम</a>
        <a href="#" class="nav-item"><span>👥</span>पार्टी</a>
        <a href="#" class="nav-item"><span>🧾</span>बिल</a>
        <a href="#" class="nav-item"><span>📦</span>आइटम</a>
        <a href="#" class="nav-item"><span>👤</span>प्रोफाइल</a>
    </nav>
</div>
</body>
  </html>
